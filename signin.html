<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Zest — Sign In</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0c0c0f;
            color: #f2f2f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 48px 32px;
            max-width: 480px;
            width: 100%;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(212,245,60,0.2);
            border-top-color: #d4f53c;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-text {
            font-size: 14px; color: #8888a8;
        }
        .error { color: #ff6b8a; display: none; margin-top: 16px; font-size: 14px; }
        /* Override Clerk's default styles to match dark theme */
        .cl-rootBox { margin: 0 auto; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading">
            <div class="spinner"></div>
            <p id="loading-text">Loading sign-in...</p>
        </div>
        <div id="clerk-sign-in"></div>
        <p class="error" id="error"></p>
    </div>

    <script
        data-clerk-publishable-key="pk_test_cXVhbGl0eS1wb3Jwb2lzZS02OC5jbGVyay5hY2NvdW50cy5kZXYk"
        src="https://quality-porpoise-68.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
        crossorigin="anonymous"
    ></script>
    <script>
        // Pass callback_port through to the callback page
        const params = new URLSearchParams(window.location.search);
        const callbackPort = params.get('callback_port') || '';
        const CALLBACK_URL = 'https://tryzest.app/auth/callback' +
            (callbackPort ? '?callback_port=' + callbackPort : '');

        window.addEventListener('load', init);

        async function init() {
            try {
                await window.Clerk.load();

                // If already signed in, go straight to callback
                if (window.Clerk.session) {
                    window.location.href = CALLBACK_URL;
                    return;
                }

                // Hide loading, mount sign-in component
                document.getElementById('loading').style.display = 'none';
                window.Clerk.mountSignIn(document.getElementById('clerk-sign-in'), {
                    afterSignInUrl: CALLBACK_URL,
                    redirectUrl: CALLBACK_URL,
                    appearance: {
                        variables: {
                            colorPrimary: '#d4f53c',
                            colorBackground: '#1a1a2e',
                            colorText: '#f2f2f8',
                            colorInputBackground: '#16162a',
                            colorInputText: '#f2f2f8',
                        }
                    }
                });

            } catch (err) {
                showError(err.message || 'Something went wrong. Please try again.');
            }
        }

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
