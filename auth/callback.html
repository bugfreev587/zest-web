<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Zest — Signing in...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0c0c0f;
            color: #f2f2f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 48px 32px;
            max-width: 420px;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(212,245,60,0.2);
            border-top-color: #d4f53c;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h1 {
            font-size: 20px; font-weight: 700;
            margin-bottom: 12px;
        }
        p {
            font-size: 14px; color: #8888a8;
            line-height: 1.6;
        }
        .error { color: #ff6b8a; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <h1 id="title">Signing you in...</h1>
        <p id="message">Redirecting back to Zest.</p>
        <p class="error" id="error"></p>
    </div>

    <script
        data-clerk-publishable-key="pk_test_cXVhbGl0eS1wb3Jwb2lzZS02OC5jbGVyay5hY2NvdW50cy5kZXYk"
        src="https://quality-porpoise-68.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
        crossorigin="anonymous"
    ></script>
    <script>
        window.addEventListener('load', init);

        async function init() {
            try {
                await window.Clerk.load();

                if (!window.Clerk.session) {
                    // No session — redirect to sign-in page
                    window.location.href = '/signin';
                    return;
                }

                // Get session token
                const token = await window.Clerk.session.getToken();
                if (!token) throw new Error('Could not get session token');

                // Redirect to desktop app
                document.getElementById('title').textContent = 'Success!';
                document.getElementById('message').textContent = 'Opening Zest...';
                window.location.href = 'zest://auth?session_token=' + encodeURIComponent(token);

                // Fallback message
                setTimeout(() => {
                    document.getElementById('message').textContent =
                        'If Zest didn\'t open, make sure the app is running and try again.';
                }, 3000);

            } catch (err) {
                showError(err.message || 'Something went wrong. Please try again.');
            }
        }

        function showError(msg) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').textContent = 'Sign-in failed';
            document.getElementById('message').style.display = 'none';
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
